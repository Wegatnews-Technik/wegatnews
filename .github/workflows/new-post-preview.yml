name: Neuer Post Preview

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-preview-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.POST_BOT_TOKEN }}

      - name: Node installieren
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      - name: Neuen Post aus /neuer-post übernehmen
        run: |
          set -e

          MARKDOWN_FILE="$(find neuer-post -maxdepth 1 -type f -name '*.md' | head -n 1)"

          if [ -z "$MARKDOWN_FILE" ]; then
            echo "Keine Markdown-Datei in /neuer-post gefunden."
            exit 1
          fi

          ARTICLE_NUMBER="$(basename "$MARKDOWN_FILE" .md)"
          IMAGE_FILE="neuer-post/${ARTICLE_NUMBER}.webp"

          if [ ! -f "$IMAGE_FILE" ]; then
            echo "Kein passendes Bild gefunden: $IMAGE_FILE"
            exit 1
          fi

          TARGET_MARKDOWN="posts/${ARTICLE_NUMBER}.md"
          TARGET_IMAGE="public/article-images/${ARTICLE_NUMBER}.webp"

          if [ -f "$TARGET_MARKDOWN" ]; then
            echo "Artikel existiert bereits: $TARGET_MARKDOWN"
            exit 1
          fi

          if [ -f "$TARGET_IMAGE" ]; then
            echo "Bild existiert bereits: $TARGET_IMAGE"
            exit 1
          fi

          mkdir -p posts
          mkdir -p public/article-images

          cp "$MARKDOWN_FILE" "$TARGET_MARKDOWN"
          cp "$IMAGE_FILE" "$TARGET_IMAGE"

          BRANCH_NAME="post/${ARTICLE_NUMBER}"

          echo "$BRANCH_NAME" > branch_name.txt
          echo "$ARTICLE_NUMBER" > article_number.txt

          echo "Übernommen:"
          echo "$MARKDOWN_FILE -> $TARGET_MARKDOWN"
          echo "$IMAGE_FILE -> $TARGET_IMAGE"

      - name: Build testen
        run: npm run build

      - name: /neuer-post leeren
        run: |
          set -e

          ARTICLE_NUMBER="$(cat article_number.txt)"

          rm -f "neuer-post/${ARTICLE_NUMBER}.md"
          rm -f "neuer-post/${ARTICLE_NUMBER}.webp"

          # Falls weitere temporäre Dateien im Ordner liegen, diese ebenfalls löschen.
          find neuer-post -mindepth 1 -maxdepth 1 -type f -delete

          # Ordner im Repo behalten, falls er sonst leer wäre.
          touch neuer-post/.gitkeep

          echo "/neuer-post wurde geleert."

      - name: Branch committen und pushen
        run: |
          set -e

          BRANCH_NAME="$(cat branch_name.txt)"
          ARTICLE_NUMBER="$(cat article_number.txt)"

          git config user.name "wegatnews-bot"
          git config user.email "actions@github.com"

          git checkout -b "$BRANCH_NAME"

          git add "posts/${ARTICLE_NUMBER}.md"
          git add "public/article-images/${ARTICLE_NUMBER}.webp"
          git add neuer-post

          git commit -m "Add article ${ARTICLE_NUMBER}"
          git push --force-with-lease origin "$BRANCH_NAME"

      - name: Pull Request erstellen
        env:
          GH_TOKEN: ${{ secrets.POST_BOT_TOKEN }}
        run: |
          set -e

          BRANCH_NAME="$(cat branch_name.txt)"
          ARTICLE_NUMBER="$(cat article_number.txt)"

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Neuer Artikel ${ARTICLE_NUMBER}" \
            --body "Neuer Artikel aus /neuer-post.

          Dateien:
          - posts/${ARTICLE_NUMBER}.md
          - public/article-images/${ARTICLE_NUMBER}.webp

          Der Ordner /neuer-post wird in diesem Pull Request geleert.

          Netlify sollte für diesen Pull Request automatisch einen Deploy Preview erzeugen.

          Wenn der Preview passt, entweder den grünen Merge-Button nutzen oder kommentieren:

          /publish"